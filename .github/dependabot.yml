version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - gradle
    commit-message:
      prefix: deps
    versioning-strategy: increase
    groups:
      compose:
        patterns:
          - "androidx.compose:*"
      androidx:
        patterns:
          - "androidx.*"
          - "androidx*"
      android-tooling:
        patterns:
          - "com.android.*"
          - "org.jetbrains.kotlin*"
          - "com.diffplug.spotless*"
          - "io.gitlab.arturbosch.detekt*"
          - "com.github.ben-manes*"
          - "com.autonomousapps*"
          - "nl.littlerobots*"
      shizuku:
        patterns:
          - "dev.rikka.shizuku:*"
