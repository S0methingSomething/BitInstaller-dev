name: Set up Android Gradle
description: Configure Android Gradle tooling after repository checkout.

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: temurin

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
