name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v0.1.0-alpha'
        required: true
        default: 'v0.1.0-alpha'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate version tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          VERSION_NAME=$(grep -E 'versionName = "[^"]+"' app/build.gradle.kts | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          test "$RELEASE_TAG" = "v$VERSION_NAME"

      - name: Validate release signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.BITINSTALLER_RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.BITINSTALLER_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.BITINSTALLER_RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/bitinstaller-release.jks

      - name: Build release APK
        env:
          BITINSTALLER_RELEASE_STORE_FILE: bitinstaller-release.jks
          BITINSTALLER_RELEASE_STORE_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_STORE_PASSWORD }}
          BITINSTALLER_RELEASE_KEY_ALIAS: ${{ secrets.BITINSTALLER_RELEASE_KEY_ALIAS }}
          BITINSTALLER_RELEASE_KEY_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_KEY_PASSWORD }}
        run: ./gradlew fullReleaseCheck --build-cache -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4 -Dorg.gradle.jvmargs='-Xmx2g -XX:MaxMetaspaceSize=768m' -Dkotlin.daemon.jvmargs='-Xmx2g' --stacktrace

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          target_commitish: main
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
