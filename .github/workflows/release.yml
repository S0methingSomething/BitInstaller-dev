name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v0.1.0-alpha'
        required: true
        default: 'v0.1.0-alpha'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Validate version tag
        run: |
          set -euo pipefail

          VERSION_NAME=$(grep -E 'versionName = "[^"]+"' app/build.gradle.kts | sed -E 's/.*versionName = "([^"]+)".*/\1/')
          if [ "$RELEASE_TAG" != "v$VERSION_NAME" ]; then
            printf 'Release tag %s does not match app versionName %s\n' "$RELEASE_TAG" "$VERSION_NAME" >&2
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            printf 'Release tag %s does not exist in this checkout\n' "$RELEASE_TAG" >&2
            exit 1
          fi

      - name: Validate release signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.BITINSTALLER_RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.BITINSTALLER_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$RELEASE_KEYSTORE_BASE64" ] || [ -z "$RELEASE_STORE_PASSWORD" ] || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
            printf '%s\n' 'Release signing secrets are required for release builds.' >&2
            exit 1
          fi

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.BITINSTALLER_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          KEYSTORE_PATH="$RUNNER_TEMP/bitinstaller-release.jks"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          printf 'BITINSTALLER_RELEASE_STORE_FILE=%s\n' "$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          BITINSTALLER_RELEASE_STORE_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_STORE_PASSWORD }}
          BITINSTALLER_RELEASE_KEY_ALIAS: ${{ secrets.BITINSTALLER_RELEASE_KEY_ALIAS }}
          BITINSTALLER_RELEASE_KEY_PASSWORD: ${{ secrets.BITINSTALLER_RELEASE_KEY_PASSWORD }}
        run: ./gradlew fullReleaseCheck --build-cache --stacktrace

      - name: Delete release keystore
        if: always()
        run: |
          if [ -n "${BITINSTALLER_RELEASE_STORE_FILE:-}" ]; then
            rm -f "$BITINSTALLER_RELEASE_STORE_FILE"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
