name: Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Run quality checks
        run: ./gradlew qualityCheck --build-cache --stacktrace
