name: Build APK

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4 -Dorg.gradle.jvmargs='-Xmx2g -XX:MaxMetaspaceSize=768m' -Dkotlin.daemon.jvmargs='-Xmx2g' --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BitInstaller-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
