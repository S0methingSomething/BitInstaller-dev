name: Build APK

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Android Gradle
        uses: ./.github/actions/setup-android-gradle

      - name: Validate debug signing secrets
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.BITINSTALLER_DEBUG_KEYSTORE_BASE64 }}
          DEBUG_STORE_PASSWORD: ${{ secrets.BITINSTALLER_DEBUG_STORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.BITINSTALLER_DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.BITINSTALLER_DEBUG_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if { [ -n "$DEBUG_KEYSTORE_BASE64" ] || [ -n "$DEBUG_STORE_PASSWORD" ] || [ -n "$DEBUG_KEY_ALIAS" ] || [ -n "$DEBUG_KEY_PASSWORD" ]; } && \
             { [ -z "$DEBUG_KEYSTORE_BASE64" ] || [ -z "$DEBUG_STORE_PASSWORD" ] || [ -z "$DEBUG_KEY_ALIAS" ] || [ -z "$DEBUG_KEY_PASSWORD" ]; }; then
            printf '%s\n' 'Debug signing secrets must be configured all together or omitted entirely.' >&2
            exit 1
          fi

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.BITINSTALLER_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            KEYSTORE_PATH="$RUNNER_TEMP/bitinstaller-debug.jks"
            printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            chmod 600 "$KEYSTORE_PATH"
            printf 'BITINSTALLER_DEBUG_STORE_FILE=%s\n' "$KEYSTORE_PATH" >> "$GITHUB_ENV"
          fi

      - name: Run full build check
        env:
          BITINSTALLER_DEBUG_STORE_PASSWORD: ${{ secrets.BITINSTALLER_DEBUG_STORE_PASSWORD }}
          BITINSTALLER_DEBUG_KEY_ALIAS: ${{ secrets.BITINSTALLER_DEBUG_KEY_ALIAS }}
          BITINSTALLER_DEBUG_KEY_PASSWORD: ${{ secrets.BITINSTALLER_DEBUG_KEY_PASSWORD }}
        run: ./gradlew fullBuildCheck --build-cache --stacktrace

      - name: Delete debug keystore
        if: always()
        run: |
          if [ -n "${BITINSTALLER_DEBUG_STORE_FILE:-}" ]; then
            rm -f "$BITINSTALLER_DEBUG_STORE_FILE"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BitInstaller-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload compiler metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compiler-metrics
          path: build/reports/kotlin-build/
          if-no-files-found: ignore
